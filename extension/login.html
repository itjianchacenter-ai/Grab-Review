<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JIANCHA · Sign in</title>
  <link rel="icon" href="/images/grabfavicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500&family=Cormorant+Garamond:wght@500&display=swap" />
  <style>
    :root {
      --jc-black: #181818;
      --jc-tan: #AD9C82;
      --jc-tan-dark: #8D7E66;
      --jc-gray: #525252;
      --jc-cream: #EBE9E6;
      --jc-cream-light: #F5F4F2;
      --jc-white: #FFFFFF;
      --jc-red: #B23A48;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: "Inter", "IBM Plex Sans Thai", system-ui, sans-serif;
      background: var(--jc-cream-light);
      color: var(--jc-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--jc-white);
      border-radius: 16px;
      padding: 44px 36px 32px;
      box-shadow: 0 4px 24px rgba(24, 24, 24, 0.06);
      border: 1px solid rgba(235, 233, 230, 0.8);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-wordmark {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--jc-black);
      line-height: 1;
    }
    .brand-subtitle {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--jc-tan);
      margin-top: 8px;
      font-weight: 500;
    }

    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--jc-gray);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--jc-cream);
      border-radius: 8px;
      background: var(--jc-cream-light);
      color: var(--jc-black);
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--jc-tan);
      background: var(--jc-white);
    }
    .field input::placeholder { color: #B0AFAB; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      background: var(--jc-black);
      color: var(--jc-white);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: var(--jc-tan-dark); }
    button[type="submit"]:disabled {
      background: var(--jc-gray);
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: rgba(178, 58, 72, 0.08);
      color: var(--jc-red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--jc-gray);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-wordmark">JIANCHA</div>
      <div class="brand-subtitle">Internal Dashboard</div>
    </div>

    <div class="error" id="error"></div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" id="submit-btn">
        <span id="submit-label">Sign in</span>
      </button>
    </form>

    <div class="footer">© JIANCHA · jc-group-global.com</div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');
    const submitLabel = document.getElementById('submit-label');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitLabel.textContent = 'กำลังตรวจสอบ…';

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const d = await r.json();
        if (!r.ok || !d.ok) {
          errorEl.textContent = d.error || 'เข้าสู่ระบบไม่สำเร็จ';
          errorEl.classList.add('show');
          submitBtn.disabled = false;
          submitLabel.textContent = 'Sign in';
          return;
        }
        // Redirect — prefer next param, then reviews, fallback dashboard
        const next = new URLSearchParams(location.search).get('next') || '/reviews.html';
        location.href = next;
      } catch (err) {
        errorEl.textContent = 'เชื่อมต่อ server ไม่ได้';
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitLabel.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
